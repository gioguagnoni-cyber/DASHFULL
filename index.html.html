<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI Dashboard — DIZZ 1 WAVE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;--bg4:#242840;
  --bd:#2a2f45;--bd2:#363c58;
  --txt:#e8eaf2;--muted:#6b7499;--muted2:#4a5070;
  --green:#22c55e;--green-dim:#15803d;--green-bg:#0d2818;
  --red:#ef4444;--red-dim:#991b1b;--red-bg:#2a0f0f;
  --yellow:#f59e0b;--yellow-dim:#92400e;--yellow-bg:#2a1d05;
  --blue:#60a5fa;--blue-dim:#1d4ed8;--blue-bg:#0d1e3a;
  --purple:#a855f7;--cyan:#22d3ee;--accent:#4f6ef7;--accent2:#6d85ff;
}
body{background:var(--bg);color:var(--txt);font-family:'Inter','Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh}
#stickyHdr{display:none}






.roi-pos{color:var(--green)}.roi-neg{color:var(--red)}.roi-warn{color:var(--yellow)}.roi-zero{color:var(--muted)}
#dayTabBar{display:flex;gap:6px;padding:12px 16px 0;background:var(--bg2);border-bottom:2px solid var(--bd);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.dtab{padding:7px 16px;border-radius:8px 8px 0 0;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);background:var(--bg2);border:1px solid var(--bd);border-bottom:none;transition:all .15s;display:flex;align-items:center;gap:6px;}
.dtab:hover{color:var(--txt);background:var(--bg3)}
.dtab.active{color:var(--txt);background:var(--bg3);border-color:var(--accent);}
.badge-final{background:var(--green-bg);color:var(--green);font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid var(--green-dim)}
.badge-parcial{background:var(--yellow-bg);color:var(--yellow);font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid var(--yellow-dim)}
.day-panel{display:none;padding:0 16px 24px}
.day-panel.active{display:block}
.subtab-bar{display:flex;gap:4px;padding:14px 0 0;margin-bottom:12px}
.stab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);background:transparent;border:1px solid transparent;transition:all .15s;}
.stab:hover{color:var(--txt);background:var(--bg3)}
.stab.active{color:var(--accent2);background:var(--bg3);border-color:var(--bd2)}
.sub-panel{display:none}.sub-panel.active{display:block}
.mini-kpis{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;align-items:center;}
.mk{display:flex;flex-direction:column;gap:2px}
.mk-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.mk-val{font-size:13px;font-weight:600}
.mk-sep{width:1px;background:var(--bd);margin:0 2px;height:28px}
.note-box{font-size:11px;color:var(--muted);padding:6px 10px;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;margin-bottom:8px;}
.tbl-wrap{overflow-x:auto;border:1px solid var(--bd);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg3);color:var(--txt);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;border-bottom:2px solid var(--bd2);white-space:nowrap;text-align:right;cursor:pointer;user-select:none;transition:background .15s;}thead th:hover{background:var(--bg4);color:var(--accent2)}thead th.sort-asc::after{content:" ▲";font-size:9px;color:var(--accent2)}thead th.sort-desc::after{content:" ▼";font-size:9px;color:var(--accent2)}thead th.th-hist{cursor:default!important}thead th.th-hist:hover{background:var(--bg3)!important;color:var(--muted)!important}
thead th:first-child{text-align:left;position:sticky;left:0;z-index:2;background:var(--bg3)}
th.th-broad{color:var(--blue)!important}
th.th-cap{color:var(--purple)!important}
th.th-hist{color:var(--muted)!important;font-size:10px!important;font-weight:600!important}
th.th-camp{text-align:left}
tbody tr{border-bottom:1px solid var(--bd);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
td{padding:7px 10px;text-align:right;white-space:nowrap;}
td:first-child{text-align:left;position:sticky;left:0;z-index:1;background:var(--bg2)}
tr:hover td:first-child{background:var(--bg3)}
td.camp-name{font-weight:600;color:var(--txt)}
.suffix{font-size:10px;color:var(--muted);font-weight:400}
.num-pos{color:var(--green)}.num-neg{color:var(--red)}.num-warn{color:var(--yellow)}.num-muted{color:var(--muted)}
.val-broad{color:var(--blue)}.val-cap{color:var(--purple)}.val-zero{color:var(--muted2)}
.hist-cell{font-size:11px}
tfoot td{padding:8px 10px;font-weight:700;font-size:12px;background:var(--bg4);border-top:2px solid var(--bd2);text-align:right;color:var(--txt)}
tfoot td:first-child{text-align:left;position:sticky;left:0;background:var(--bg4)}
.schip{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;display:inline-block;white-space:nowrap;}
.s-lucro{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim)}
.s-negativo{background:var(--red-bg);color:var(--red);border:1px solid var(--red-dim)}
.s-quase{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-dim)}
.s-aguardando{background:var(--bg4);color:var(--muted);border:1px solid var(--bd)}

body.light{
  --bg:#f2f4fb;--bg2:#ffffff;--bg3:#e8eaf6;--bg4:#dde0f0;
  --bd:#c8cce4;--bd2:#b0b6d0;

}
#themeBtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

body.light{

}

}

<div id="sidebar"><div id="sb-inner"></div><div id="sb-footer"></div></div>
<button id="sb-toggle" onclick="(function(){var s=document.getElementById('sidebar'),o=document.getElementById('sb-overlay');s.classList.toggle('open');o.classList.toggle('open')})()">☰</button>
<div id="sb-overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('open')"></div>
<div id="mainContent"><div id="dayPanels"></div></div>
<div id="_loadOverlay" style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px"><style>.sp{width:36px;height:36px;border:3px solid var(--bd2);border-top-color:var(--accent);border-radius:50%;animation:_sp .8s linear infinite}@keyframes _sp{to{transform:rotate(360deg)}}</style><div class="sp"></div><div style="color:var(--muted);font-size:13px">Carregando dados…</div></div>


<script>
// ── SUPABASE ─────────────────────────────────────────────────────────────────
var DAYS = [];
var HIST = {};

function switchDay(di) {
  document.querySelectorAll('.day-panel').forEach(function(el, i) { el.classList.toggle('active', i === di); });
  document.querySelectorAll('.sb-day').forEach(function(el) {
    var isActive = +el.dataset.di === di;
    el.classList.toggle('open', isActive);
  });
  var gItem = document.querySelector('.sb-geral');
  if (gItem) gItem.classList.toggle('active', di === DAYS.length);
  var sb = document.getElementById('sidebar');
  if (sb) sb.classList.remove('open');
  var ov = document.getElementById('sb-overlay');
  if (ov) ov.classList.remove('open');
}

function switchSub(di, code) {
  var panel = document.getElementById('dp-' + di);
  panel.querySelectorAll('.sub-panel').forEach(function(el) { el.classList.toggle('active', el.dataset.code === code); });
  document.querySelectorAll('.sb-sub-item[data-di="'+di+'"]').forEach(function(el) {
    el.classList.toggle('active', el.dataset.code === code);
  });
}

function _initDashboard() {


function brl(v) {
  var neg = v < 0, a = Math.abs(v);
  var s = 'R$' + a.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return neg ? '-' + s : s;
}
function pct(v, st) {
  if (st === 'aguardando' || v === null || v === undefined) return '<span class="roi-zero">—</span>';
  var cls = v >= 0 ? 'roi-pos' : (v >= -25 ? 'roi-warn' : 'roi-neg');
  return '<span class="' + cls + '">' + (v >= 0 ? '+' : '') + v.toFixed(1) + '%</span>';
}
function histCell(lbl, di, back) {
  var tgt = di - back;
  if (tgt < 0) return '<span class="roi-zero">—</span>';
  var h = HIST[lbl];
  if (!h || !(tgt in h)) return '<span class="roi-zero">—</span>';
  var v = h[tgt];
  if (v === null || v === undefined) return '<span class="roi-zero">—</span>';
  var cls = v >= 0 ? 'roi-pos' : (v >= -25 ? 'roi-warn' : 'roi-neg');
  return '<span class="' + cls + '">' + (v >= 0 ? '+' : '') + v.toFixed(1) + '%</span>';
}
function schip(st) {
  var mp = {lucro:'s-lucro|✅ Lucro', negativo:'s-negativo|🔴 Neg.', quase:'s-quase|⚠️ Quase', aguardando:'s-aguardando|⏳'};
  var p = (mp[st] || 's-aguardando|⏳').split('|');
  return '<span class="schip ' + p[0] + '">' + p[1] + '</span>';
}
function mkpis(items) {
  return items.map(function(it) {
    if (it === '|') return '<div class="mk-sep"></div>';
    return '<div class="mk"><div class="mk-lbl">' + it[0] + '</div><div class="mk-val ' + (it[2]||'') + '">' + it[1] + '</div></div>';
  }).join('');
}

function renderDireto(day) {
  var di = day.di, camps = day.direto, t = day.d_tot;
  var rows = camps.map(function(c) {
    return '<tr>' +
      '<td class="camp-name">' + c.label + '</td>' +
      '<td>' + brl(c.spend) + '</td>' +
      '<td class="num-muted">' + brl(c.tax) + '</td>' +
      '<td>' + brl(c.cost) + '</td>' +
      '<td class="' + (c.rev > 0 ? '' : 'num-muted') + '">' + (c.rev > 0 ? brl(c.rev) : '—') + '</td>' +
      '<td class="' + (c.rev_adj > 0 ? '' : 'num-muted') + '">' + (c.rev_adj > 0 ? brl(c.rev_adj) : '—') + '</td>' +
      '<td class="' + (c.profit >= 0 ? 'num-pos' : 'num-neg') + '">' + brl(c.profit) + '</td>' +
      '<td>' + pct(c.roi, c.status) + '</td>' +
      
      '<td class="hist-cell">' + histCell(c.label, di, 1) + '</td>' +
      '<td class="hist-cell">' + histCell(c.label, di, 2) + '</td>' +
      '<td class="hist-cell">' + histCell(c.label, di, 3) + '</td>' +
      '<td class="hist-cell">' + histCell(c.label, di, 7) + '</td>' +
      '<td class="hist-cell">' + histCell(c.label, di, 14) + '</td>' +
      '<td class="hist-cell">' + histCell(c.label, di, 30) + '</td>' +
      '</tr>';
  }).join('');
  var tfoot = '<tr>' +
    '<td>TOTAL</td><td>' + brl(t.spend) + '</td><td class="num-muted">' + brl(t.tax) + '</td>' +
    '<td>' + brl(t.cost) + '</td><td>' + brl(t.rev) + '</td><td>' + brl(t.rev_adj) + '</td>' +
    '<td class="' + (t.profit >= 0 ? 'num-pos' : 'num-neg') + '">' + brl(t.profit) + '</td>' +
    '<td>' + pct(t.roi, t.rev > 0 ? 'lucro' : 'negativo') + '</td>' +
    
    '<td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td></tr>';
  var kpis = mkpis([

  var hasCap = camps.some(function(c) { return c.cap_rev > 0; });

  var rows = camps.map(function(c) {
    var broadAdj = Math.round(c.broad_rev * 0.9 * 100) / 100;

(function() {

    if(!campData[c.label]){

        a.rev+=c.rev;a.rev_adj+=c.rev_adj;a.profit+=c.profit;

        else if(c.status==='negativo')a.days_neg++;
        if(c.roi!==null&&c.roi!==undefined){
          a.best_roi=a.best_roi===null?c.roi:Math.max(a.best_roi,c.roi);

      kCard('💬','Novos Contatos',''+novosTotal,'','Total via Mensagens')+

  '</div>';

function renderCampDetail(lbl) {
  var c = _campDataG[lbl];
  if (!c) return '<p>Campanha não encontrada.</p>';
  var isMsgs = c.typ === 'msgs';
  var typLabel = isMsgs ? 'Mensagens' : 'Tráfego Direto';
  var typIcon  = isMsgs ? '💬' : '🎯';

  // Helper: recompute status from actual values (spend=0 but rev>0 should not be aguardando)
  function realStatus(cd) {
    if (cd.spend === 0 && cd.rev === 0) return 'aguardando';
    if (cd.profit >= 0) return 'lucro';
    if (cd.cost > 0 && cd.profit >= -0.25 * cd.cost) return 'quase';
    return 'negativo';
  }

  // Collect per-day data
  var dayRows = DAYS.map(function(day) {
    var arr = isMsgs ? day.msgs : day.direto;
    for (var i = 0; i < arr.length; i++) {
      if (arr[i].label === lbl) return {day: day, cd: arr[i]};
    }
    return null;
  }).filter(Boolean);

  // ROI bar chart
  var roiVals = dayRows.map(function(r){
    var st = realStatus(r.cd);
    if (st === 'aguardando') return null;
    if (r.cd.cost === 0 && r.cd.profit > 0) return 999; // revenue-only, no spend
    return r.cd.roi;
  });
  var nonNull = roiVals.filter(function(v){return v!==null;});
  var maxAbs = nonNull.length ? Math.max.apply(null,nonNull.map(Math.abs)) : 100;
  if (maxAbs < 30) maxAbs = 30;
  var chartBars = dayRows.map(function(r,i){
    var roi = roiVals[i];
    var barH = roi===null ? 4 : Math.max(Math.abs(roi)/maxAbs*72, 3);
    var st_b = realStatus(r.cd);
    var color = roi===null ? 'var(--muted2)' :
      (st_b==='lucro'?'var(--green)':st_b==='quase'?'var(--yellow)':'var(--red)');
    var lshort = r.day.label.substring(0,5);
    var rtxt = roi===null ? '—' : roi===999 ? '∞' : (roi>=0?'+':'')+roi.toFixed(1)+'%';
    var displayH = roi===999 ? 72 : barH;
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'+
      '<span style="font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap">'+rtxt+'</span>'+
      '<div style="flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center">'+
        '<div style="width:75%;height:'+(roi===999?72:barH).toFixed(0)+'px;background:'+color+';border-radius:3px 3px 0 0"></div>'+
      '</div>'+
      '<span style="font-size:10px;color:var(--muted)">'+lshort+'</span>'+
    '</div>';
  }).join('');
  var chart = '<div style="display:flex;gap:4px;background:var(--bg3);border-radius:8px;padding:16px 16px 12px;margin:12px 0 20px;height:130px">'+chartBars+'</div>';

  // KPI summary
  var roi_str = c.roi!==null ? ((c.roi>=0?'+':'')+c.roi.toFixed(1)+'%') : '—';
  var roi_cls = c.roi!==null ? (c.roi>=0?'num-pos':'num-neg') : '';
  var kpis = [
    ['Gasto', brl(c.spend)],
    ['Custo Total', brl(c.cost)],
    ['Rec. AdX', brl(c.rev)],
    ['Rec. Líq.', brl(c.rev_adj)],
    ['Lucro', '<span class="'+clrG(c.profit)+'">'+brl(c.profit)+'</span>'],
    ['ROI Acum.', '<span class="'+roi_cls+'" style="font-weight:700">'+roi_str+'</span>'],
    ['Dias Lucro', c.days_lucro+'/'+c.days_active],
    ['Melhor ROI', '<span class="num-pos">'+((c.best_roi!==null)?'+'+(c.best_roi).toFixed(1)+'%':'—')+'</span>'],
    ['Pior ROI', '<span class="num-neg">'+((c.worst_roi!==null)?(c.worst_roi).toFixed(1)+'%':'—')+'</span>']
  ];
  if (isMsgs) {
    kpis.push(['Novos Contatos', c.novos]);
    kpis.push(['Custo/Lead', c.avg_rpc?'R$'+c.avg_rpc.toFixed(2).replace('.',','):'—']);
  }
  // split kpis into rows of 3
  var kpiRows = [];
  for(var ki=0; ki<kpis.length; ki+=3) kpiRows.push(kpis.slice(ki,ki+3));
  var kpiHtml = kpiRows.map(function(row){
    return '<div class="gkpi-row">'+row.map(function(k){
      return '<div class="gkpi-card"><div class="gkpi-label">'+k[0]+'</div><div class="gkpi-val">'+k[1]+'</div></div>';
    }).join('')+'</div>';
  }).join('');

  // Day-by-day table
  var tblH, tblR;

    tblH = '<tr><th>Data</th><th>Status</th><th>Gasto</th><th>Custo</th>'+

      '<th>Lucro</th><th>ROI%</th><th>Novos</th><th>Imp. FB</th></tr>';
    tblR = dayRows.map(function(r){
      var cd=r.cd, d=r.day;
      var st_m = realStatus(cd);
      var sc = st_m==='lucro'?'num-pos':st_m==='negativo'?'num-neg':'';
      var roi_d = st_m==='aguardando'?'—':cd.cost===0&&cd.profit>0?'∞':((cd.roi>=0?'+':'')+cd.roi.toFixed(2)+'%');
      var stB = st_m==='lucro'?'✅':st_m==='quase'?'⚠️':st_m==='negativo'?'❌':'⏳';
      return '<tr>'+
        '<td style="font-weight:600">'+d.label+'</td>'+
        '<td>'+stB+' '+st_m+'</td>'+
        '<td>'+brl(cd.spend)+'</td><td>'+brl(cd.cost)+'</td>'+
        '<td>'+brl(cd.broad_rev)+'</td><td>'+brl(cd.cap_rev)+'</td>'+
        '<td>'+brl(cd.rev)+'</td><td>'+brl(cd.rev_adj)+'</td>'+
        '<td class="'+clrG(cd.profit)+'">'+brl(cd.profit)+'</td>'+
        '<td class="'+sc+'" style="font-weight:700">'+roi_d+'</td>'+
        '<td class="num-muted">'+cd.novos+'</td>'+
        '<td class="num-muted">'+((cd.fb_imp||0).toLocaleString('pt-BR'))+'</td>'+
      '</tr>';
    }).join('');
  } else {
    tblH = '<tr><th>Data</th><th>Status</th><th>Gasto</th><th>Custo</th>'+
      '<th>Rec. AdX</th><th>Rec. Líq.</th><th>Lucro</th><th>ROI%</th>'+
      '<th>RPM</th><th>Imp. GAM</th><th>Imp. FB</th></tr>';
    tblR = dayRows.map(function(r){
      var cd=r.cd, d=r.day;
      var st_d = realStatus(cd);
      var sc = st_d==='lucro'?'num-pos':st_d==='negativo'?'num-neg':'';
      var roi_d = st_d==='aguardando'?'—':cd.cost===0&&cd.profit>0?'∞':((cd.roi>=0?'+':'')+cd.roi.toFixed(2)+'%');
      var stB = st_d==='lucro'?'✅':st_d==='quase'?'⚠️':st_d==='negativo'?'❌':'⏳';
      return '<tr>'+
        '<td style="font-weight:600">'+d.label+'</td>'+
        '<td>'+stB+' '+st_d+'</td>'+
        '<td>'+brl(cd.spend)+'</td><td>'+brl(cd.cost)+'</td>'+
        '<td>'+brl(cd.rev)+'</td><td>'+brl(cd.rev_adj)+'</td>'+
        '<td class="'+clrG(cd.profit)+'">'+brl(cd.profit)+'</td>'+
        '<td class="'+sc+'" style="font-weight:700">'+roi_d+'</td>'+
        '<td class="num-muted">'+((cd.rpm||0).toFixed(0))+'</td>'+
        '<td class="num-muted">'+((cd.gam_imp||0))+'</td>'+
        '<td class="num-muted">'+((cd.fb_imp||0).toLocaleString('pt-BR'))+'</td>'+
      '</tr>';
    }).join('');
  }
  var tbl = '<div class="tbl-wrap" style="margin-top:0"><table><thead>'+tblH+'</thead><tbody>'+tblR+'</tbody></table></div>';

  return '<div style="padding:16px 0 40px">'+
    '<button id="btn-back-geral" style="background:var(--bg3);border:1px solid var(--bd);color:var(--txt);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:20px">← Voltar ao Ranking</button>'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">'+
      '<span style="font-size:28px">'+typIcon+'</span>'+
      '<div><div style="font-size:22px;font-weight:700;color:var(--fg)">'+lbl+'</div>'+
      '<div style="font-size:13px;color:var(--muted)">'+typLabel+'</div></div>'+
    '</div>'+
    kpiHtml+
    '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:4px 0 0">ROI por dia</div>'+
    chart+
    '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:4px 0 8px">Detalhamento por dia</div>'+
    tbl+
    '</div>';
}

// ── Sorting via event delegation ─────────────────────────────────────────────
var _sortState = {};

function parseVal(html) {
  // strip tags
  var txt = html.replace(/<[^>]+>/g, '').trim();
  if (!txt || txt === '—') return -Infinity;
  // percentage  e.g. +79.3%  -35.9%
  var pm = txt.match(/[+-]?\d+[.,]\d+\s*%/);
  if (pm) return parseFloat(pm[0].replace(',', '.'));
  // BRL  e.g. R$1.234,56  -R$1.234,56
  var neg = txt.charAt(0) === '-';
  var clean = txt.replace(/[^0-9,]/g, '').replace(',', '.');
  if (!clean) return -Infinity;
  return (neg ? -1 : 1) * parseFloat(clean);
}

document.addEventListener('click', function(e) {
  var th = e.target.closest('thead th');
  if (!th) return;
  // skip history columns and rowspan structural headers (second header row in msgs)
  if (th.classList.contains('th-hist')) return;
  var thRow = th.parentElement;
  var thead = thRow.parentElement;
  // only act on first header row
  if (thRow !== thead.rows[0]) return;
  var table = thead.closest('table');
  var tbody = table.querySelector('tbody');
  if (!tbody) return;
  var col = Array.from(thRow.cells).indexOf(th);
  var asc = th.dataset.sort !== 'asc';
  Array.from(thRow.cells).forEach(function(c){ delete c.dataset.sort; c.classList.remove('sort-asc','sort-desc'); });
  th.dataset.sort = asc ? 'asc' : 'desc';
  th.classList.add(asc ? 'sort-asc' : 'sort-desc');
  var rows = Array.from(tbody.rows);
  rows.sort(function(a,b){
    var av = parseVal(a.cells[col] ? a.cells[col].innerHTML : '');
    var bv = parseVal(b.cells[col] ? b.cells[col].innerHTML : '');
    return asc ? av - bv : bv - av;
  });
  rows.forEach(function(r){ tbody.appendChild(r);  });
});

        return {label:'CAMP'+r.camp_n,n:r.camp_n,spend:+r.spend,tax:+r.tax,cost:+r.cost,
          rev:+r.rev,rev_adj:+r.rev_adj,profit:+r.profit,roi:r.roi!==null?+r.roi:null,
          rpm:+r.rpm,gam_imp:r.gam_imp,fb_imp:r.fb_imp,status:r.status,typ:'direto',
          broad_rev:+r.broad_rev,cap_rev:+r.cap_rev};
      });
      var msgs=(mByDi[di]||[]).map(function(r){
        return {label:'CARRO'+r.carro_n,n:r.carro_n,suffix:r.suffix,
          spend:+r.spend,tax:+r.tax,cost:+r.cost,broad_rev:+r.broad_rev,cap_rev:+r.cap_rev,
          rev:+r.rev,rev_adj:+r.rev_adj,profit:+r.profit,roi:r.roi!==null?+r.roi:null,
          rpm:+r.rpm,broad_imp:r.broad_imp,cap_imp:r.cap_imp,fb_imp:r.fb_imp,
          novos:r.novos||0,rpc:+r.rpc,status:r.status,typ:'msgs'};
      });
      function sumTot(arr,statKey){
        var s=0,tx=0,c=0,rv=0,ra=0,p=0,ln=0;
        arr.forEach(function(x){s+=x.spend;tx+=x.tax;c+=x.cost;rv+=x.rev;ra+=x.rev_adj;p+=x.profit;if(x.status===statKey)ln++;});
        return {spend:R2(s),tax:R2(tx),cost:R2(c),rev:R2(rv),rev_adj:R2(ra),profit:R2(p),
          roi:R2(c)>0?R2(R2(p)/R2(c)*100):null,lucro_n:ln,total:arr.length};
      }
      var dt=sumTot(direto,'lucro'), mt=sumTot(msgs,'lucro');
      var all=direto.concat(msgs);
      var ts=0,ttx=0,tc=0,tr=0,tra=0,tp=0;
      all.forEach(function(x){ts+=x.spend;ttx+=x.tax;tc+=x.cost;tr+=x.rev;tra+=x.rev_adj;tp+=x.profit;});
      var total={spend:R2(ts),tax:R2(ttx),cost:R2(tc),rev:R2(tr),rev_adj:R2(tra),profit:R2(tp),
        roi:R2(tc)>0?R2(R2(tp)/R2(tc)*100):null,
        lucro_n:dt.lucro_n+mt.lucro_n,lucro_d:dt.lucro_n,lucro_m:mt.lucro_n,total:all.length};
      return {di:day.di,label:day.label,badge:day.badge,ts:day.ts,direto:direto,msgs:msgs,d_tot:dt,m_tot:mt,total:total};
    });
    document.getElementById('_loadOverlay').style.display='none';
    _initDashboard();
  }).catch(function(e){
    document.getElementById('_loadOverlay').innerHTML=
      '<div style="color:#ef4444;padding:32px;text-align:center;font-size:14px">'+
      '⚠️ Erro ao carregar dados:<br><code style=\"font-size:11px\">'+e.message+'</code></div>';
    console.error(e);
  });
})();

</script>
